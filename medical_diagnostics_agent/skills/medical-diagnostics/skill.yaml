id: medical-diagnostics-v1
name: medical-diagnostics
version: 1.0.0
author: paras@getbindu.com

# Description
description: |
  Multi-specialist medical diagnostic analysis using coordinated AI agents.
  Analyzes patient cases from cardiology, pulmonology, and psychology perspectives.

# Tags and Modes
tags:
  - medical-diagnostics
  - healthcare-analysis
  - multi-specialist
  - cardiology
  - pulmonology
  - psychology

input_modes:
  - text/plain
  - application/json

output_modes:
  - text/plain
  - application/json

# Example Queries
examples:
  - "Analyze this patient case: 48-year-old male with chest tightness, shortness of breath, BP 148/92, HR 96 bpm"
  - "Evaluate patient with persistent fatigue, rapid heartbeat, anxiety, and poor sleep quality"
  - "Multi-specialist diagnostic analysis for patient with respiratory and cardiac symptoms"

# Detailed Capabilities
capabilities_detail:
  primary_capability:
    supported: true
    description: "Multi-specialist medical diagnostic analysis using three coordinated AI agents"
    features:
      - "Cardiologist agent analyzes cardiac workup and cardiovascular risks"
      - "Psychologist agent evaluates mental health and stress factors"
      - "Pulmonologist agent assesses respiratory conditions"
      - "Multidisciplinary synthesis produces top 3 possible diagnoses"
    limitations: "Requires OpenRouter API key, processes text-based patient reports only, no image analysis"

  secondary_capability:
    supported: false
    planned_version: "2.0.0"
    description: "Not supported by code"

# Requirements
requirements:
  packages:
    - "langchain-openai"
    - "langchain-core"
    - "pydantic"
    - "bindu"
    - "python-dotenv"
  system:
    - "Python 3.12+"
  min_memory_mb: 256

# Performance Metrics
performance:
  avg_processing_time_ms: 15000
  max_concurrent_requests: 10
  memory_per_request_mb: 256
  scalability: horizontal

# Tool Restrictions
allowed_tools:
  - Read
  - Write
  - Execute

# Rich Documentation
documentation:
  overview: |
    Multi-agent system that coordinates three specialist AI agents (Cardiologist, Psychologist, Pulmonologist)
    to analyze patient medical reports. Each specialist agent independently reviews the patient case from their
    domain perspective, then a MultidisciplinaryTeam agent synthesizes all reports into a final diagnosis
    with top 3 possible health issues. Built on LangChain with OpenRouter models (default: gpt-4o).

  use_cases:
    when_to_use:
      - "Multi-perspective medical case analysis requiring cardiology, psychology, and pulmonology input"
      - "Patient symptom evaluation with vital signs and lab results"
      - "Diagnostic support for complex cases with overlapping symptoms"
      - "Second opinion generation from multiple specialist viewpoints"

    when_not_to_use:
      - "Real-time emergency medical decisions"
      - "Medical image analysis (X-rays, CT scans, MRIs)"
      - "Specialties outside cardiology, psychology, pulmonology"
      - "Legal medical documentation or prescriptions"

  input_structure: |
    JSON-RPC 2.0 message with patient case description in text format.

    Example:
    {
      "jsonrpc": "2.0",
      "method": "message/send",
      "params": {
        "message": {
          "role": "user",
          "parts": [
            {
              "kind": "text",
              "text": "Patient profile: 48-year-old male with chest tightness, shortness of breath, BP 148/92 mmHg, HR 96 bpm, O2 sat 94%, BMI 29. Labs: LDL 155 mg/dL, HDL 40 mg/dL, triglycerides 210 mg/dL, glucose 118 mg/dL."
            }
          ],
          "kind": "message",
          "messageId": "f6b8c930-5616-49ad-b187-d93cbbC00001",
          "contextId": "f6b8c930-5616-49ad-b187-d93cbbC00002",
          "taskId": "f6b8c930-5616-49ad-b187-d93cbbC00003"
        },
        "skillId": "medical-diagnostics-v1",
        "configuration": {
          "acceptedOutputModes": ["application/json"]
        }
      },
      "id": "f6b8c930-5616-49ad-b187-d93cbbC00003"
    }

    Constraints:
    - Text-based patient reports only
    - Must include patient symptoms and relevant clinical data
    - No structured format required, natural language accepted

  output_format: |
    JSON-RPC 2.0 result with task history and artifacts containing markdown-formatted diagnosis.

    Success Response:
    {
      "jsonrpc": "2.0",
      "id": "f6b8c930-5616-49ad-b187-d93cbbc00004",
      "result": {
        "id": "f6b8c930-5616-49ad-b187-d93cbbc00003",
        "context_id": "f6b8c930-5616-49ad-b187-d93cbbc00002",
        "kind": "task",
        "status": {
          "state": "completed",
          "timestamp": "2026-03-11T09:16:33.732766+00:00"
        },
        "history": [
          {
            "role": "assistant",
            "parts": [
              {
                "kind": "text",
                "text": "### Final Diagnosis:\n\n- **Hypertension and Dyslipidemia:** ...\n- **Obstructive Sleep Apnea (OSA):** ...\n- **Anxiety and Stress:** ...\n\n---\n*Analysis performed by AI Medical Diagnostics Agent*\n*Specialist inputs: Cardiologist, Psychologist, Pulmonologist*\n*Model: gpt-4o*"
              }
            ]
          }
        ],
        "artifacts": [
          {
            "name": "result",
            "parts": [{"kind": "text", "text": "Markdown formatted diagnosis"}]
          }
        ]
      }
    }

    Error Response:
    {
      "jsonrpc": "2.0",
      "result": {
        "history": [
          {
            "role": "assistant",
            "parts": [{"kind": "text", "text": "Error during medical diagnosis: <error message>"}]
          }
        ]
      }
    }

  error_handling:
    - "Missing API key: Returns ValueError with setup instructions"
    - "Empty patient report: Returns error message requesting medical report"
    - "Agent execution errors: Caught and returned as formatted error strings"
    - "LangChain chain failures: Logged and returned with error prefix"
    - "No timeout mechanism implemented in current version"

  examples:
    - title: "Multi-specialist cardiac and respiratory case"
      input:
        parts:
          - kind: "text"
            text: "48-year-old male with chest tightness, shortness of breath during mild exertion, BP 148/92 mmHg, HR 96 bpm, O2 sat 94%, BMI 29, LDL 155 mg/dL, HDL 40 mg/dL, triglycerides 210 mg/dL, glucose 118 mg/dL, elevated stress, poor sleep, mild anxiety"
      output:
        text: |
          ### Final Diagnosis:

          - **Hypertension and Dyslipidemia:** Elevated blood pressure and abnormal lipid levels indicate cardiovascular risk factors for coronary artery disease

          - **Obstructive Sleep Apnea (OSA):** Poor sleep quality and elevated BMI suggest OSA, contributing to respiratory insufficiency and low oxygen saturation

          - **Anxiety and Stress:** Mild anxiety symptoms and elevated stress levels exacerbate physical symptoms like chest tightness and shortness of breath

          ---
          *Analysis performed by AI Medical Diagnostics Agent*
          *Specialist inputs: Cardiologist, Psychologist, Pulmonologist*
          *Model: gpt-4o*

    - title: "Fatigue and anxiety case with anemia"
      input:
        parts:
          - kind: "text"
            text: "35-year-old female with persistent fatigue, intermittent shortness of breath, rapid heartbeat during mild activity, increased anxiety, chest discomfort, poor sleep, difficulty concentrating. BP 135/88 mmHg, HR 102 bpm, O2 sat 95%, BMI 26, Hemoglobin 11.2 g/dL, LDL 130 mg/dL, Vitamin D 20 ng/mL"
      output:
        text: |
          ### Final Diagnosis:

          - **Anemia:** Hemoglobin level of 11.2 g/dL indicates anemia, leading to fatigue, shortness of breath, and palpitations due to reduced oxygen-carrying capacity

          - **Anxiety Disorder:** Rapid heartbeat, poor sleep quality, and difficulty concentrating are consistent with anxiety disorder

          - **Asthma or Respiratory Condition:** Intermittent shortness of breath and chest discomfort suggest possible asthma, with mild hypoxemia (O2 sat 95%)

          ---
          *Analysis performed by AI Medical Diagnostics Agent*
          *Specialist inputs: Cardiologist, Psychologist, Pulmonologist*
          *Model: gpt-4o*

  best_practices:
    for_developers:
      - "Use async/await pattern for all agent operations"
      - "Set OPENROUTER_API_KEY environment variable before initialization"
      - "Handle agent errors gracefully with try-except blocks"
      - "Test with various patient case formats and edge cases"

    for_orchestrators:
      - "Route multi-specialist medical diagnostic requests to this skill"
      - "Expect 10-20 second processing time for concurrent agent execution"
      - "Match queries containing cardiology, pulmonology, or psychology keywords"
      - "Implement retry logic for API failures"
      - "Monitor OpenRouter API usage and rate limits"

  installation: |
    Install via uv package manager or pip.

    Required packages:
    uv sync

    Environment variables:
    OPENROUTER_API_KEY=<your-openrouter-key>
    MODEL_NAME=gpt-4o (optional, defaults to gpt-4o)

    Run:
    uv run python -m medical_diagnostics_agent

    Server runs on http://127.0.0.1:3773 by default

  versioning:
    - version: "1.0.0"
      date: "2026-03-11"
      changes: "Initial release with Cardiologist, Psychologist, Pulmonologist agents and MultidisciplinaryTeam synthesis"
    - version: "1.1.0"
      status: "planned"
      changes: "Not supported by code"

# Assessment fields for skill negotiation
assessment:
  keywords:
    - "medical"
    - "diagnosis"
    - "diagnostic"
    - "patient"
    - "cardiology"
    - "cardiologist"
    - "psychology"
    - "psychologist"
    - "pulmonology"
    - "pulmonologist"
    - "symptoms"
    - "health"
    - "clinical"
    - "vital signs"
    - "lab results"

  specializations:
    - domain: "medical-diagnostics"
      confidence_boost: 0.3
    - domain: "healthcare-analysis"
      confidence_boost: 0.2

  anti_patterns:
    - "Medical image analysis or radiology"
    - "Prescription generation or medication dosing"
    - "Emergency medical decisions"
    - "Specialties outside cardiology, psychology, pulmonology"

  complexity_indicators:
    simple:
      - "Single symptom evaluation"
      - "Basic vital signs review"
    medium:
      - "Multi-symptom patient case with vital signs and lab results"
      - "Diagnostic analysis from specific specialist perspective"
    complex:
      - "Complex multi-system cases requiring all three specialists"
      - "Cases with extensive lab work and multiple risk factors"
